name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the artifact (e.g. v1.0.0-test)'
        required: true

jobs:
  build-module:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Module/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Module/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build DLL
        working-directory: Module
        run: cargo build --release

      - name: Assemble archive
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $staging = "staging"

          New-Item -ItemType Directory -Force -Path "$staging/Scripts/DCS-API" | Out-Null
          New-Item -ItemType Directory -Force -Path "$staging/Scripts/Hooks"   | Out-Null

          Copy-Item "Module/target/release/dcsapi.dll"  "$staging/Scripts/DCS-API/dcsapi.dll"
          Copy-Item "Module/lua/dcsapi_export.lua"      "$staging/Scripts/DCS-API/dcsapi_export.lua"
          Copy-Item "Module/dcsapi.cfg"                 "$staging/Scripts/DCS-API/dcsapi.cfg"
          Copy-Item "Module/lua/dcsapi.lua"             "$staging/Scripts/Hooks/dcsapi.lua"

          $archive = "dcsapi-module-$version.zip"
          Compress-Archive -Path "$staging/*" -DestinationPath $archive
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - name: Upload artifact (all runs)
        uses: actions/upload-artifact@v4
        with:
          name: dcsapi-module-${{ steps.version.outputs.VERSION }}
          path: ${{ env.ARCHIVE }}
          retention-days: 14

      - name: Create GitHub release (tag push only)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.ARCHIVE }}

  build-docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: API
          push: true
          tags: |
            ghcr.io/m1ndgames/dcs-api:${{ steps.version.outputs.VERSION }}
            ghcr.io/m1ndgames/dcs-api:latest
